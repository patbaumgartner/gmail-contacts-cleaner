# ─────────────────────────────────────────────────────────────────────────────
# Gmail Contacts Cleaner – production compose file
#
# Pulls the pre-built native image from Docker Hub. Two modes:
#
#   One-shot (default) — the container cleans all accounts once and exits.
#     Drive it from host cron / a NAS task scheduler:
#       0 3 * * * cd /path/to/gmail-contacts-cleaner && docker compose up
#
#   Server mode — long-running container with the built-in nightly scheduler:
#       SPRING_PROFILES_ACTIVE=server docker compose up -d
#
# Quick start
# ───────────
#   cp .env.example .env          # fill in your accounts + app passwords
#   docker compose pull
#   docker compose up
# ─────────────────────────────────────────────────────────────────────────────

services:

  contacts-cleaner:
    image: patbaumgartner/contacts-cleaner:${VERSION:-latest}
    container_name: contacts-cleaner
    restart: "no"
    environment:
      # ── Runtime mode ──────────────────────────────────────────────────────────
      # Empty → one-shot run at startup, then exit.
      # 'server' → long-running with built-in nightly scheduler.
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-}"

      # ── Accounts (add ACCOUNTS_2_, ACCOUNTS_3_, ... as needed) ────────────────
      CONTACTSCLEANER_ACCOUNTS_0_NAME: "${ACCOUNT_0_NAME:-personal}"
      CONTACTSCLEANER_ACCOUNTS_0_EMAIL: "${ACCOUNT_0_EMAIL}"
      CONTACTSCLEANER_ACCOUNTS_0_APPPASSWORD: "${ACCOUNT_0_APP_PASSWORD}"
      CONTACTSCLEANER_ACCOUNTS_0_ENABLED: "${ACCOUNT_0_ENABLED:-true}"
      CONTACTSCLEANER_ACCOUNTS_0_DRYRUN: "${ACCOUNT_0_DRY_RUN:-false}"
      CONTACTSCLEANER_ACCOUNTS_1_NAME: "${ACCOUNT_1_NAME:-}"
      CONTACTSCLEANER_ACCOUNTS_1_EMAIL: "${ACCOUNT_1_EMAIL:-}"
      CONTACTSCLEANER_ACCOUNTS_1_APPPASSWORD: "${ACCOUNT_1_APP_PASSWORD:-}"
      CONTACTSCLEANER_ACCOUNTS_1_ENABLED: "${ACCOUNT_1_ENABLED:-false}"
      CONTACTSCLEANER_ACCOUNTS_1_DRYRUN: "${ACCOUNT_1_DRY_RUN:-false}"

      # ── Scheduler (server mode only) ──────────────────────────────────────────
      CONTACTS_CLEANER_SCHEDULER_CRON: "${CONTACTS_CLEANER_SCHEDULER_CRON:-0 0 3 * * *}"
      CONTACTS_CLEANER_SCHEDULER_ZONE: "${CONTACTS_CLEANER_SCHEDULER_ZONE:-Europe/Zurich}"

      # ── Cleaning rules (destructive options are opt-in) ───────────────────────
      CONTACTS_CLEANER_PHONE_REGION: "${CONTACTS_CLEANER_PHONE_REGION:-}"
      CONTACTS_CLEANER_REMOVE_EMPTY_PROPERTIES: "${CONTACTS_CLEANER_REMOVE_EMPTY_PROPERTIES:-true}"
      CONTACTS_CLEANER_DETECT_DUPLICATE_CONTACTS: "${CONTACTS_CLEANER_DETECT_DUPLICATE_CONTACTS:-true}"
      CONTACTS_CLEANER_MERGE_DUPLICATE_CONTACTS: "${CONTACTS_CLEANER_MERGE_DUPLICATE_CONTACTS:-false}"
      CONTACTS_CLEANER_EXTRACT_BIRTHDAYS: "${CONTACTS_CLEANER_EXTRACT_BIRTHDAYS:-true}"
      CONTACTS_CLEANER_REMOVE_SOCIAL_NETWORK_NOTES: "${CONTACTS_CLEANER_REMOVE_SOCIAL_NETWORK_NOTES:-true}"
      CONTACTS_CLEANER_REMOVE_INVALID_EMAILS: "${CONTACTS_CLEANER_REMOVE_INVALID_EMAILS:-true}"
      CONTACTS_CLEANER_VERIFY_EMAIL_DOMAINS: "${CONTACTS_CLEANER_VERIFY_EMAIL_DOMAINS:-false}"
      CONTACTS_CLEANER_REMOVE_SHARED_PHONE_NUMBERS: "${CONTACTS_CLEANER_REMOVE_SHARED_PHONE_NUMBERS:-false}"
      CONTACTS_CLEANER_SHARED_PHONE_NUMBER_THRESHOLD: "${CONTACTS_CLEANER_SHARED_PHONE_NUMBER_THRESHOLD:-2}"
      CONTACTS_CLEANER_REMOVE_NOTES: "${CONTACTS_CLEANER_REMOVE_NOTES:-false}"
      CONTACTS_CLEANER_DELETE_EMPTY_CONTACTS: "${CONTACTS_CLEANER_DELETE_EMPTY_CONTACTS:-false}"

      # ── HTML report (mounted to ./reports on the host) ────────────────────────
      CONTACTS_CLEANER_REPORT_DIRECTORY: /reports
    volumes:
      - ./reports:/reports
