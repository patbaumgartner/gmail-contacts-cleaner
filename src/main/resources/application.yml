application:
  version: "@project.version@"

spring:
  application:
    name: contacts-cleaner
  config:
    import:
      - "optional:file:../.env[.properties]"
      - "optional:file:.env[.properties]"
  main:
    web-application-type: none
    banner-mode: console
  threads:
    virtual:
      enabled: true

logging:
  level:
    org.springframework: INFO
    com.patbaumgartner: DEBUG
    root: INFO

contacts-cleaner:
  # One-shot run at startup (default mode for containers driven by external cron).
  # The `server` profile disables it in favor of the built-in nightly scheduler.
  startup-run:
    enabled: "${CONTACTS_CLEANER_STARTUP_RUN_ENABLED:true}"

  # Built-in scheduler — enabled by the `server` profile.
  scheduler:
    enabled: "${CONTACTS_CLEANER_SCHEDULER_ENABLED:false}"
    cron: "${CONTACTS_CLEANER_SCHEDULER_CRON:0 0 3 * * *}"
    zone: "${CONTACTS_CLEANER_SCHEDULER_ZONE:Europe/Zurich}"

  # Google CardDAV endpoint — override base-url only for testing.
  carddav:
    base-url: "${CONTACTS_CLEANER_CARDDAV_BASE_URL:https://www.google.com}"
    connect-timeout: 10s
    read-timeout: 60s
    request-delay: 200ms

  # Cleaning rules. Destructive options are opt-in.
  cleaning:
    normalize-phone-numbers: "${CONTACTS_CLEANER_NORMALIZE_PHONE_NUMBERS:true}"
    # ISO 3166-1 alpha-2 region (e.g. CH, DE, US) for E.164 formatting of national
    # numbers like "044 668 18 00". Empty = separator stripping only.
    phone-region: "${CONTACTS_CLEANER_PHONE_REGION:}"
    remove-duplicate-phone-numbers: "${CONTACTS_CLEANER_REMOVE_DUPLICATE_PHONE_NUMBERS:true}"
    # Verify mobile vs landline against the numbering plan: provably mobile
    # numbers gain TYPE=CELL, provably fixed-line numbers lose a wrong one.
    # Ambiguous plans (e.g. US) are never judged.
    correct-phone-types: "${CONTACTS_CLEANER_CORRECT_PHONE_TYPES:true}"
    # Drop numbers that are provably invalid for their country (wrong length,
    # undialable fragments like '*133#' or '12 9001') — judged via libphonenumber.
    # National numbers are only judged when phone-region is set.
    remove-invalid-phone-numbers: "${CONTACTS_CLEANER_REMOVE_INVALID_PHONE_NUMBERS:false}"
    # Drop fax numbers (TEL;TYPE=FAX, work and home) — it is not 1995.
    remove-fax-numbers: "${CONTACTS_CLEANER_REMOVE_FAX_NUMBERS:false}"
    # Drop instant-messenger handles (ICQ, AIM, Yahoo, Skype, ...) — dead networks.
    remove-instant-messengers: "${CONTACTS_CLEANER_REMOVE_INSTANT_MESSENGERS:true}"
    # NOTE: Google does not expose custom fields (CSV "Custom Field") over CardDAV —
    # this rule only reaches label debris present in the vCards. Fields like 'Age'
    # must be cleaned once via CSV export/import at contacts.google.com.
    # Custom-field labels to delete (comma-separated, case-insensitive). 'Age' is
    # stale by definition; other candidates from old sync tools: Other Organizations.
    # Empty disables the rule. The export-analysis IT prints an inventory.
    remove-custom-fields: "${CONTACTS_CLEANER_REMOVE_CUSTOM_FIELDS:Age,Photo}"
    # Organization names to delete (comma-separated, prefix match) — for companies
    # that no longer exist, e.g. "Namics". Empty disables the rule.
    remove-organizations: "${CONTACTS_CLEANER_REMOVE_ORGANIZATIONS:}"
    # Keep only the primary organization; drop imported employment history
    # (Google's "Other Organizations", served as extra ORG entries via CardDAV).
    remove-additional-organizations: "${CONTACTS_CLEANER_REMOVE_ADDITIONAL_ORGANIZATIONS:false}"
    # Drop organizations that merely repeat the person's own name (import artifact).
    remove-self-organizations: "${CONTACTS_CLEANER_REMOVE_SELF_ORGANIZATIONS:true}"
    # Drop job titles when the contact has no organization (incl. titles orphaned
    # by organization removal).
    remove-dangling-titles: "${CONTACTS_CLEANER_REMOVE_DANGLING_TITLES:true}"
    # Cross-contact: rewrite organization spellings to the most frequent variant
    # per company ('namics AG' -> 'Namics AG'). Folds legal-form variants of the
    # same brand; disable if you track subsidiaries separately.
    canonicalize-organizations: "${CONTACTS_CLEANER_CANONICALIZE_ORGANIZATIONS:true}"
    # Drop postal addresses that are a less complete copy of another address on the
    # same contact (all filled components equal) — the richer one survives.
    remove-redundant-addresses: "${CONTACTS_CLEANER_REMOVE_REDUNDANT_ADDRESSES:true}"
    # Drop addresses consisting of nothing but geo coordinates (check-in debris).
    remove-geo-coordinate-addresses: "${CONTACTS_CLEANER_REMOVE_GEO_COORDINATE_ADDRESSES:true}"
    normalize-email-addresses: "${CONTACTS_CLEANER_NORMALIZE_EMAIL_ADDRESSES:true}"
    remove-duplicate-email-addresses: "${CONTACTS_CLEANER_REMOVE_DUPLICATE_EMAIL_ADDRESSES:true}"
    # Drop e-mail addresses that are not syntactically valid (missing @, no TLD).
    remove-invalid-emails: "${CONTACTS_CLEANER_REMOVE_INVALID_EMAILS:true}"
    # Resolve mail domains via DNS and drop addresses whose domain no longer exists
    # (authoritative NXDOMAIN only — DNS timeouts never count). Needs network access.
    verify-email-domains: "${CONTACTS_CLEANER_VERIFY_EMAIL_DOMAINS:false}"
    trim-names: "${CONTACTS_CLEANER_TRIM_NAMES:true}"
    # Drop parenthesized name suffixes like '(JIRA)' — messenger import junk.
    remove-junk-name-suffixes: "${CONTACTS_CLEANER_REMOVE_JUNK_NAME_SUFFIXES:true}"
    # Repair broken names: ALL-CAPS -> smart casing, 'Dr' -> 'Dr.', e-mail
    # addresses stuck in name fields are moved to the contact's e-mails.
    repair-names: "${CONTACTS_CLEANER_REPAIR_NAMES:true}"
    # Replace custom e-mail/address labels with standard vCard types: work/home
    # variants (incl. German) become TYPE=WORK/HOME, other custom labels
    # ('Internet email', 'Obsolete', ...) are dropped for the default type.
    normalize-labels: "${CONTACTS_CLEANER_NORMALIZE_LABELS:true}"
    # Drop properties whose value is entirely blank (empty TEL/EMAIL/URL/NOTE,
    # all-blank ORG/ADR) — sync debris, considered non-destructive.
    remove-empty-properties: "${CONTACTS_CLEANER_REMOVE_EMPTY_PROPERTIES:true}"
    # Report-only: log contact pairs that look like duplicates of each other.
    # Nothing is merged or deleted automatically.
    detect-duplicate-contacts: "${CONTACTS_CLEANER_DETECT_DUPLICATE_CONTACTS:true}"
    # Swap given/family name when the contact's own e-mail proves the order was
    # flipped (name 'Girba Tudor' + e-mail tudor.girba@...). Never guesses.
    repair-flipped-names: "${CONTACTS_CLEANER_REPAIR_FLIPPED_NAMES:true}"
    # Promote "Geburtstag: 12.03.1980"-style notes to a proper BDAY property.
    # Never overwrites an existing birthday, never modifies the note.
    extract-birthdays: "${CONTACTS_CLEANER_EXTRACT_BIRTHDAYS:true}"
    # Strip machine-generated XING/LinkedIn sync lines from notes
    # (profile URLs, "Created via LinkedIn"). User-written text is preserved.
    remove-social-network-notes: "${CONTACTS_CLEANER_REMOVE_SOCIAL_NETWORK_NOTES:true}"
    # Remove phone numbers appearing on N or more contacts — switchboards and shared
    # household lines, not direct numbers. Raise to 3 to keep couples' landlines.
    remove-shared-phone-numbers: "${CONTACTS_CLEANER_REMOVE_SHARED_PHONE_NUMBERS:false}"
    shared-phone-number-threshold: "${CONTACTS_CLEANER_SHARED_PHONE_NUMBER_THRESHOLD:2}"
    remove-notes: "${CONTACTS_CLEANER_REMOVE_NOTES:false}"
    # Delete contacts carrying no information at all: no phone, no e-mail, no
    # birthday, no address, no URL, no note, no organization.
    delete-empty-contacts: "${CONTACTS_CLEANER_DELETE_EMPTY_CONTACTS:false}"

  # Single-page HTML report written after every run — open
  # reports/cleanup-report-latest.html to review changes (ideal with dry-run).
  report:
    enabled: "${CONTACTS_CLEANER_REPORT_ENABLED:true}"
    directory: "${CONTACTS_CLEANER_REPORT_DIRECTORY:reports}"

  # Accounts are configured via environment variables (relaxed binding) or a local
  # .env / application-local.yml. Example:
  #
  #   CONTACTSCLEANER_ACCOUNTS_0_NAME=personal
  #   CONTACTSCLEANER_ACCOUNTS_0_EMAIL=jane.doe@gmail.com
  #   CONTACTSCLEANER_ACCOUNTS_0_APPPASSWORD=abcd efgh ijkl mnop
  #   CONTACTSCLEANER_ACCOUNTS_1_NAME=work
  #   ...
  #
  # See .env.example at the repository root for the full reference.
  # accounts:
  #   - name: personal
  #     email: jane.doe@gmail.com
  #     app-password: "abcd efgh ijkl mnop"
  #     enabled: true
  #     dry-run: false
